<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLTS Cambodia - Verification</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .captcha-card {
            background: white;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 400px;
            text-align: center;
            margin: 16px;
        }

        .captcha-box {
            background: #f9f9f9;
            border: 1px solid #d3d3d3;
            border-radius: 3px;
            height: 74px;
            width: 100%;
            max-width: 300px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            margin: 20px auto;
            position: relative;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .checkbox {
            width: 28px;
            height: 28px;
            border: 2px solid #c1c1c1;
            border-radius: 2px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .checkbox i {
            color: #009b4d;
            font-size: 20px;
            display: none;
        }

        .checkbox.checked {
            border-color: transparent;
        }

        .checkbox.checked i {
            display: block;
        }

        .label-text {
            font-size: 14px;
            color: #2c2c2c;
            font-weight: 400;
        }

        .recaptcha-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }

        .recaptcha-logo img {
            width: 32px;
            height: 32px;
        }

        .recaptcha-text {
            font-size: 10px;
            color: #555;
            font-weight: 400;
        }

        .links {
            font-size: 8px;
            color: #555;
            display: flex;
            gap: 4px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4a90e2;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

    <div class="captcha-card">
        <h1 class="text-xl font-bold text-gray-800 mb-2">Are you human?</h1>
        <p class="text-sm text-gray-500 mb-6">Please verify you are not a robot to continue.</p>

        <div class="captcha-box">
            <div class="checkbox-container" onclick="verify()">
                <div class="checkbox" id="checkbox">
                    <i class="fa-solid fa-check"></i>
                    <div class="spinner" id="spinner"></div>
                </div>
                <span class="label-text">I'm not a robot</span>
            </div>

            <div class="recaptcha-logo">
                <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" alt="reCAPTCHA">
                <span class="recaptcha-text">reCAPTCHA</span>
                <div class="links">
                    <span>Privacy</span>
                    <span>-</span>
                    <span>Terms</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function verify() {
            const checkbox = document.getElementById('checkbox');
            const spinner = document.getElementById('spinner');
            const checkIcon = checkbox.querySelector('i');

            if (checkbox.classList.contains('checked')) return;

            // Show spinner
            spinner.style.display = 'block';
            
            setTimeout(() => {
                spinner.style.display = 'none';
                checkbox.classList.add('checked');
                
                // Redirect after a short delay
                setTimeout(() => {
                    window.location.href = 'loading.html';
                }, 1000);
            }, 1500);
        }
    </script>
</body>

</html>
