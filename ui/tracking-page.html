<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLTS Cambodia - Tracking Page</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f6fa;
            /* Hide overflow to make the map fill the remaining screen */
            overflow: hidden;
        }

        /* Navbar Gradient Background */
        .navbar-gradient {
            background: linear-gradient(90deg, #5c6cf2 0%, #aa64f5 100%);
        }

        /* Map Container */
        .map-container {
            /* Fallback background if Map isn't loaded */
            background-color: #e5e7eb;
            position: relative;
            /* In a real scenario, this is where the Google Maps/Leaflet iframe goes */
            /* We simulate it with a beautiful map background to match the UI */
            background-image: url('https://docs.stadiamaps.com/images/gallery/alidade-smooth-mac-1-min.png');
            background-size: cover;
            background-position: center;
        }

        /* Floating Search Bar */
        .floating-search {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            position: absolute;
            top: 16px; /* Reduced for mobile */
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px); /* Full width minus margins */
            max-width: 600px;
            display: flex;
            align-items: center;
            padding: 12px 20px;
            z-index: 20;
        }

        @media (min-width: 640px) {
            .floating-search {
                top: 24px;
                padding: 14px 24px;
                width: 90%;
            }
        }

        /* Floating Action Button (Start) */
        .start-button {
            background-color: #7b61ff;
            color: white;
            font-weight: 600;
            font-size: 16px;
            position: absolute;
            bottom: 30px; /* Adjusted for mobile */
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 40px;
            width: 200px; /* Fixed width on small screens */
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(123, 97, 255, 0.4);
            transition: all 0.2s;
            z-index: 20;
            border: none;
            cursor: pointer;
        }

        @media (min-width: 640px) {
            .start-button {
                bottom: 40px;
                padding: 14px 48px;
                width: auto;
            }
        }

        .start-button:hover {
            background-color: #6a4df5;
            transform: translateX(-50%) translateY(-2px);
            box-shadow: 0 6px 20px rgba(123, 97, 255, 0.5);
        }

        .start-button:active {
            transform: translateX(-50%) translateY(0);
        }

        /* Mock Map Route Line (Visual Only) */
        .mock-route {
            position: absolute;
            top: 20%;
            left: 25%;
            width: 45%;
            height: 60%;
            pointer-events: none;
            z-index: 10;
        }

        svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        /* Mock Pins */
        .map-pin {
            position: absolute;
            z-index: 15;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .pin-blue {
            background: #2563eb;
            color: white;
        }
    </style>
</head>

<body class="h-screen w-full flex flex-col">

    <!-- Top Navbar -->
    <header
        class="navbar-gradient h-[70px] w-full flex items-center justify-between px-6 shrink-0 shadow-sm z-30 relative">
        <div class="flex items-center gap-3">
            <div
                class="w-11 h-11 rounded-full bg-white/20 flex items-center justify-center text-white font-bold text-lg shadow-inner">
                DL</div>
            <div class="text-white">
                <h1 class="text-[17px] font-bold leading-tight tracking-wide">DLTS Cambodia</h1>
                <p class="text-[11px] text-blue-50/90 font-medium tracking-wide">Domestic Logistic Tracking - Gen-Z-UI
                </p>
            </div>
        </div>

        <div class="flex items-center gap-3 sm:gap-4 ml-auto">
            <div class="text-right text-white hidden sm:block">
                <div class="text-[15px] font-bold leading-tight mb-0.5" style="text-shadow: 0 1px 2px rgba(0,0,0,0.1);">
                    Hello,</div>
                <div class="text-xs font-medium text-white/90">SAY Koemsor</div>
            </div>

            <!-- Avatar -->
            <div
                class="w-[42px] h-[42px] rounded-full bg-[#111827] border-[1.5px] border-white/30 shadow-md flex items-center justify-center text-white font-bold text-[15px] tracking-wider hover:ring-2 hover:ring-white/50 transition-all cursor-pointer">
                SK
            </div>

            <!-- Notifications Bell -->
            <a href="not-today.html"
                class="relative w-[42px] h-[42px] rounded-full bg-white/20 hover:bg-white/30 transition-all flex items-center justify-center text-white focus:outline-none shadow-inner border border-white/20 backdrop-blur-sm group ml-0.5">
                <i
                    class="fa-regular fa-bell text-[19px] group-hover:rotate-[15deg] transition-transform duration-300"></i>
                <span
                    class="absolute top-[10px] right-[11px] w-2.5 h-2.5 rounded-full bg-[#ff4757] border-[2px] border-[#9165f6] shadow-sm"></span>
            </a>
        </div>
    </header>

    <!-- Main Content: Map Area -->
    <main class="flex-1 map-container">

        <!-- Search Bar -->
        <div class="floating-search">
            <input type="text" value="Sangkat Phnom Penh Thmei, Phnom Penh"
                class="w-full text-[17px] text-gray-700 outline-none placeholder-gray-400 bg-transparent font-medium"
                placeholder="Enter destination...">
            <button
                class="text-gray-400 hover:text-gray-600 transition-colors bg-transparent border-none cursor-pointer pl-4">
                <i class="fa-solid fa-location-dot text-xl"></i>
            </button>
        </div>

        <!-- Simulated Map Elements to match the mockup (You would replace this with actual Google Maps/Mapbox later) -->


        <!-- Start Button -->
        <a href="on-route.html" class="start-button text-center flex items-center justify-center">
            Start
        </a>
        <div class="row g-4" style="height: calc(100vh - 170px);">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d29721.841362023748!2d104.8804897!3d11.57866705!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x310951a354c389d9%3A0xd07843ea8349e8c1!2z4Z6Y4Z6T4Z-S4Z6R4Z644Z6a4Z6W4Z-B4Z6R4Z-S4Z6Z4Z6a4Z-J4Z684Z6Z4Z-J4Z624Z6b4Z-L4Z6X4Z-S4Z6T4Z-G4Z6W4Z-B4Z6J!5e1!3m2!1skm!2skh!4v1771687754549!5m2!1skm!2skh"
                style="border:0; height: 100%; width: 100%;" allowfullscreen="" loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>

    </main>

</body>

</html>
